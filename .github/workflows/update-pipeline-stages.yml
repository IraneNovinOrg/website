name: Update Pipeline Stages

on:
  # Scheduled runs disabled until GITHUB_BOT_TOKEN secret is configured.
  # schedule:
  #   - cron: '0 */2 * * *'    # Every 2 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update stage labels on IranENovin discussions
        run: node scripts/update-pipeline-stages.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_BOT_TOKEN }}
          GITHUB_ORG: IranENovin
          GITHUB_REPO: ideas
