<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none">
  <!-- Persian Girih-inspired tiling pattern (seamless 120x120 tile) -->
  <defs>
    <pattern id="girih" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- Central 10-pointed star at tile center -->
      <g stroke="currentColor" stroke-width="1" fill="none" stroke-linejoin="round">
        <!-- Star 1 (center) -->
        <path d="M60 30 L66 48 L84 48 L70 60 L76 78 L60 68 L44 78 L50 60 L36 48 L54 48 Z"/>
        <!-- Star 2 (top-left corner) -->
        <path d="M0 0 L6 12 L18 12 L9 20 L14 32 L0 24 L-14 32 L-9 20 L-18 12 L-6 12 Z" transform="translate(0,0)"/>
        <!-- Star 3 (top-right corner) -->
        <path d="M120 0 L126 12 L138 12 L129 20 L134 32 L120 24 L106 32 L111 20 L102 12 L114 12 Z" transform="translate(0,0)"/>
        <!-- Star 4 (bottom-left corner) -->
        <path d="M0 120 L6 108 L18 108 L9 100 L14 88 L0 96 L-14 88 L-9 100 L-18 108 L-6 108 Z"/>
        <!-- Star 5 (bottom-right corner) -->
        <path d="M120 120 L126 108 L138 108 L129 100 L134 88 L120 96 L106 88 L111 100 L102 108 L114 108 Z"/>
        <!-- Connecting diamond shapes -->
        <path d="M60 0 L72 12 L60 24 L48 12 Z"/>
        <path d="M60 96 L72 108 L60 120 L48 108 Z"/>
        <path d="M0 60 L12 48 L24 60 L12 72 Z"/>
        <path d="M96 60 L108 48 L120 60 L108 72 Z"/>
      </g>
    </pattern>
  </defs>
  <rect width="120" height="120" fill="url(#girih)"/>
</svg>
