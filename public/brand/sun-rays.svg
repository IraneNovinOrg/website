<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" aria-hidden="true">
  <!-- ═══════════════════════════════════════════════════════════════
       Decorative solar-burst background. Three independent ray groups
       (outer / middle / inner) + a radial gradient core. Group ids are
       exposed so CSS can rotate them at different speeds.
       ═══════════════════════════════════════════════════════════ -->
  <defs>
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="currentColor" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="currentColor" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunInner" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="currentColor" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft radial gradient core -->
  <circle cx="200" cy="200" r="180" fill="url(#sunCore)"/>
  <circle cx="200" cy="200" r="70" fill="url(#sunInner)"/>

  <!-- ─── OUTER RING: 16 long rays ─── -->
  <g id="sun-rays-outer" transform="translate(200 200)" stroke="currentColor" stroke-linecap="round" fill="none" opacity="0.7">
    <g stroke-width="1.25">
      <line x1="0" y1="-196" x2="0" y2="-120"/>
      <g transform="rotate(22.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(67.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(112.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(157.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(202.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(247.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(292.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
      <g transform="rotate(337.5)"><line x1="0" y1="-196" x2="0" y2="-120"/></g>
    </g>
  </g>

  <!-- ─── MIDDLE RING: 12 medium rays offset by 15° ─── -->
  <g id="sun-rays-middle" transform="translate(200 200)" stroke="currentColor" stroke-linecap="round" fill="none" opacity="0.5">
    <g stroke-width="0.9">
      <g transform="rotate(15)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(75)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(105)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(165)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(195)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(255)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(285)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
      <g transform="rotate(345)"><line x1="0" y1="-170" x2="0" y2="-110"/></g>
    </g>
  </g>

  <!-- ─── INNER RING: 24 short fine rays close to center ─── -->
  <g id="sun-rays-inner" transform="translate(200 200)" stroke="currentColor" stroke-linecap="round" fill="none" opacity="0.35">
    <g stroke-width="0.6">
      <line x1="0" y1="-100" x2="0" y2="-74"/>
      <g transform="rotate(15)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(30)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(75)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(105)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(150)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(165)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(195)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(210)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(255)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(285)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(330)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
      <g transform="rotate(345)"><line x1="0" y1="-100" x2="0" y2="-74"/></g>
    </g>
  </g>

  <!-- Concentric ornamental rings -->
  <circle cx="200" cy="200" r="66" fill="none" stroke="currentColor" stroke-width="0.75" stroke-opacity="0.3"/>
  <circle cx="200" cy="200" r="48" fill="none" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.45"/>
</svg>
