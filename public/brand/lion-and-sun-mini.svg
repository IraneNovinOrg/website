<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true" role="img">
  <!-- Compact Lion & Sun mark — simplified for favicons and tight navbar use.
       Readable at 16px. Refined heraldic silhouette. -->
  <defs>
    <radialGradient id="mSun" cx="0.5" cy="0.42" r="0.72">
      <stop offset="0%"  stop-color="#FFF0CC"/>
      <stop offset="50%" stop-color="#F4B43C"/>
      <stop offset="100%" stop-color="#C98E22"/>
    </radialGradient>
  </defs>

  <!-- Sun rays: 12 tapered triangles -->
  <g transform="translate(24 24)" fill="#D4A843">
    <path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/>
    <g transform="rotate(30)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(60)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(90)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(120)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(150)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(180)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(210)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(240)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(270)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(300)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
    <g transform="rotate(330)"><path d="M0 -22 L1.4 -17 L-1.4 -17 Z"/></g>
  </g>

  <!-- Sun disc -->
  <circle cx="24" cy="24" r="16" fill="url(#mSun)" stroke="#B08624" stroke-width="0.5"/>

  <!-- Simplified lion silhouette (profile, facing right) -->
  <g transform="translate(24 27)" fill="#006B2D">
    <!-- Body + haunch -->
    <path d="M -9 -1
             C -10 -5, -6 -7, -2 -7
             C 4 -8, 9 -6, 11 -3
             C 12 -1, 11 2, 8 3
             C 3 4, -4 4, -8 3
             C -10 2, -10 0, -9 -1 Z"/>
    <!-- Mane -->
    <path d="M 4 -5
             C 2 -9, 6 -12, 10 -11
             C 13 -13, 17 -11, 16 -8
             C 18 -6, 17 -3, 14 -3
             C 10 -1, 6 -2, 4 -5 Z"/>
    <!-- Muzzle -->
    <path d="M 14 -5 C 17 -5, 18 -3, 17 -1 C 15 -1, 13 -3, 14 -5 Z"/>
    <!-- Ear -->
    <path d="M 10 -10 C 11 -12, 13 -12, 13 -10 Z" fill="#004F20"/>
    <!-- Front legs -->
    <rect x="1" y="2" width="2" height="6" rx="0.8"/>
    <rect x="5" y="2" width="2" height="6" rx="0.8"/>
    <!-- Back leg -->
    <rect x="-7" y="2" width="2" height="6" rx="0.8"/>
    <!-- Tail with tuft -->
    <path d="M -9 -1 C -13 -2, -14 -6, -12 -8 C -11 -9, -9 -8, -10 -6"
          fill="none" stroke="#006B2D" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Sword (shamshir) -->
    <path d="M -2 -8 C 4 -12, 10 -14, 16 -16 L 17 -14 C 11 -12, 5 -10, -2 -6 Z"
          fill="#D4A843"/>
    <rect x="-4" y="-9" width="3" height="2" rx="0.3" fill="#C8102E"/>
  </g>

  <!-- Red center accent -->
  <circle cx="24" cy="24" r="0.9" fill="#C8102E"/>
</svg>
