<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true" role="img">
  <!-- ═══════════════════════════════════════════════════════════════
       IranENovin — Lion & Sun (Shir o Khorshid) Emblem
       Refined heraldic style, inspired by classical Persian design.
       Palette: #D4A843 gold · #006B2D iran-green · #C8102E iran-red
       ═══════════════════════════════════════════════════════════ -->

  <defs>
    <!-- Sun disc gradient -->
    <radialGradient id="lsSunDisc" cx="0.5" cy="0.42" r="0.72">
      <stop offset="0%"  stop-color="#FFF0CC"/>
      <stop offset="45%" stop-color="#F4B43C"/>
      <stop offset="100%" stop-color="#C98E22"/>
    </radialGradient>
    <!-- Outer halo gradient -->
    <radialGradient id="lsHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="70%" stop-color="#D4A843" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0.35"/>
    </radialGradient>
    <!-- Linear gold gradient for rays -->
    <linearGradient id="lsRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4B43C"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <!-- Lion body gradient (subtle depth) -->
    <linearGradient id="lsLionBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#008C3A"/>
      <stop offset="55%"  stop-color="#006B2D"/>
      <stop offset="100%" stop-color="#004F20"/>
    </linearGradient>
    <!-- Sword blade gradient -->
    <linearGradient id="lsBlade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F4E5B8"/>
      <stop offset="50%"  stop-color="#F4B43C"/>
      <stop offset="100%" stop-color="#B08624"/>
    </linearGradient>
  </defs>

  <!-- Outer halo -->
  <circle cx="100" cy="100" r="96" fill="url(#lsHalo)"/>

  <!-- ───────── SUN: radiating rays (two interleaved rings) ───────── -->
  <g transform="translate(100 100)">
    <!-- 12 long primary rays (tapered triangles) -->
    <g fill="url(#lsRay)">
      <g>
        <path d="M0 -92 L3 -64 L-3 -64 Z"/>
      </g>
      <g transform="rotate(30)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(60)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(90)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(120)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(150)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(180)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(210)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(240)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(270)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(300)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
      <g transform="rotate(330)"><path d="M0 -92 L3 -64 L-3 -64 Z"/></g>
    </g>
    <!-- 12 shorter secondary rays offset by 15° -->
    <g fill="#D4A843" opacity="0.78">
      <g transform="rotate(15)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(45)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(75)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(105)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(135)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(165)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(195)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(225)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(255)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(285)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(315)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
      <g transform="rotate(345)"><path d="M0 -82 L2 -66 L-2 -66 Z"/></g>
    </g>
  </g>

  <!-- Sun disc -->
  <circle cx="100" cy="100" r="62" fill="url(#lsSunDisc)"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#B08624" stroke-width="1.25" stroke-opacity="0.8"/>
  <!-- Inner ornamental ring -->
  <circle cx="100" cy="100" r="54" fill="none" stroke="#FFF0CC" stroke-width="0.6" stroke-opacity="0.55"/>
  <!-- Red dot accent at sun's center (traditional bindi-like punctuation) -->
  <circle cx="100" cy="100" r="2.6" fill="#C8102E" opacity="0.9"/>

  <!-- ───────── LION IN PROFILE (heraldic, facing right, walking) ─────────
       Silhouette constructed from smooth curved paths. Sits inside sun disc.
       Drawn on a centered group around (100, 112), height ~72px. -->
  <g transform="translate(100 112)">
    <!-- Rear leg (stepping back) -->
    <path d="M 22 18 C 24 26, 25 32, 23 38 C 22 41, 20 42, 19 40 C 18 36, 19 30, 20 22 Z"
          fill="url(#lsLionBody)"/>
    <!-- Rear upper leg / haunch curve -->
    <path d="M 10 2 C 18 -2, 25 0, 28 10 C 29 14, 27 18, 22 20 C 16 20, 10 14, 10 2 Z"
          fill="url(#lsLionBody)"/>

    <!-- Main body (torso — a smooth elongated ellipse-curve) -->
    <path d="M -30 -2
             C -34 -12, -26 -18, -12 -18
             C 4 -18, 18 -14, 26 -6
             C 30 -2, 28 6, 22 10
             C 10 14, -8 14, -22 10
             C -30 6, -32 2, -30 -2 Z"
          fill="url(#lsLionBody)"/>

    <!-- Front leg planted forward (right, under chest) -->
    <path d="M 10 8 C 12 18, 12 28, 10 38 C 9 41, 7 41, 6 38 C 6 28, 6 18, 7 10 Z"
          fill="url(#lsLionBody)"/>
    <!-- Front leg raised (walking pose, bent at knee) -->
    <path d="M -2 8 C -6 14, -10 18, -8 26 C -6 30, -3 30, -2 26 C -1 20, 1 14, 2 10 Z"
          fill="url(#lsLionBody)"/>

    <!-- Tail — sweeping S-curve arcing up & back, ending in tuft -->
    <path d="M -28 -4
             C -42 -4, -50 -18, -46 -30
             C -44 -36, -38 -38, -36 -34
             C -38 -28, -40 -22, -34 -18
             C -30 -16, -26 -16, -24 -14"
          fill="none" stroke="url(#lsLionBody)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Tail tuft -->
    <path d="M -46 -30 C -50 -36, -48 -42, -44 -42 C -42 -38, -45 -34, -46 -30 Z"
          fill="#006B2D"/>

    <!-- ─── Head & mane (facing viewer's right) ─── -->
    <!-- Mane — layered flowing strands -->
    <g>
      <path d="M 20 -14
               C 14 -24, 18 -34, 28 -36
               C 32 -42, 42 -42, 46 -36
               C 54 -38, 60 -32, 58 -26
               C 64 -22, 64 -14, 58 -10
               C 60 -4, 54 2, 48 -2
               C 44 4, 34 4, 30 -2
               C 22 -2, 18 -8, 20 -14 Z"
            fill="url(#lsLionBody)"/>
      <!-- Mane strand details (darker green) -->
      <path d="M 24 -20 C 20 -22, 22 -28, 26 -28 M 32 -30 C 28 -34, 32 -38, 36 -36 M 44 -32 C 44 -36, 50 -36, 50 -32 M 54 -26 C 58 -28, 60 -22, 56 -20 M 52 -14 C 58 -14, 58 -8, 54 -8"
            fill="none" stroke="#004F20" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Muzzle / snout projecting forward -->
    <path d="M 50 -14 C 58 -14, 62 -10, 62 -6 C 62 -2, 58 0, 52 -2 C 48 -4, 48 -10, 50 -14 Z"
          fill="url(#lsLionBody)"/>
    <!-- Ear -->
    <path d="M 36 -34 C 38 -40, 44 -40, 44 -34 C 44 -32, 40 -30, 38 -32 Z"
          fill="#004F20"/>
    <!-- Eye -->
    <circle cx="50" cy="-12" r="1.4" fill="#FFF0CC"/>
    <!-- Mouth line -->
    <path d="M 56 -6 L 61 -5" stroke="#004F20" stroke-width="0.9" stroke-linecap="round"/>

    <!-- ─── Shamshir (curved Persian sword) raised behind/above lion ─── -->
    <g transform="translate(-8 -26) rotate(-28)">
      <!-- Blade: long curved crescent -->
      <path d="M 0 0
               C 18 -4, 40 -14, 62 -32
               C 64 -30, 66 -28, 66 -26
               C 46 -14, 22 -4, 2 4 Z"
            fill="url(#lsBlade)" stroke="#B08624" stroke-width="0.6"/>
      <!-- Hilt guard -->
      <rect x="-6" y="-3" width="10" height="6" rx="1" fill="#C8102E"/>
      <!-- Grip -->
      <rect x="-12" y="-2" width="6" height="4" rx="1" fill="#8B2020"/>
      <!-- Pommel -->
      <circle cx="-13" cy="0" r="2" fill="#D4A843"/>
    </g>
  </g>
</svg>
